{% extends 'base.html' %}

{% block title %}Excluir Peça — Seleto Clouting{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-6 py-12">

    <div class="mb-10">
        <a href="{% url 'listar-pecas' %}" class="flex items-center gap-1.5 text-xs uppercase tracking-widest text-gray-400 hover:text-black transition-colors mb-6">
            <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> Voltar
        </a>
    </div>

    <div class="flex flex-col items-start gap-6">
        <i data-lucide="alert-triangle" class="w-8 h-8 text-red-600"></i>

        <div>
            <h1 class="text-xs uppercase tracking-widest font-semibold mb-2">Excluir Peça</h1>
            <p class="text-sm text-gray-500">
                Você está prestes a excluir <strong class="text-black">{{ object.get_marca_display }} {{ object.modelo }}</strong>.
                Esta ação não pode ser desfeita.
            </p>
        </div>

        <form method="POST" class="flex flex-col sm:flex-row gap-3 w-full">
            {% csrf_token %}
            <button type="submit"
                    class="flex-1 bg-red-700 text-white text-xs uppercase tracking-widest py-4 hover:opacity-70 transition-opacity">
                Confirmar Exclusão
            </button>
            <a href="{% url 'listar-pecas' %}"
               class="flex-1 border border-black text-xs uppercase tracking-widest py-4 text-center hover:bg-gray-50 transition-colors">
                Cancelar
            </a>
        </form>
    </div>

</div>
{% endblock %}
