{% extends 'base.html' %}

{%block title %}Nova Peça{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Cadastrar Nova Peça</h2>
    <form action="/peca/novo/" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <label for="id_marca" class="form-label">Marca</label>
            {{ form.marca }}
        </div>
        <div class="mb-3">
            <label for="id_modelo" class="form-label">Modelo</label>
            {{ form.modelo }}
        </div>
        <div class="mb-3">
            <label for="id_ano" class="form-label">Ano</label>
            {{ form.ano }}
        </div>
        <div class="mb-3">
            <label for="id_cor" class="form-label">Cor</label>
            {{ form.cor }}
        </div>
        <div class="mb-3">
            <label for="id_tamanho" class="form-label">Tamanho</label>
            {{ form.tamanho }}
        </div>
        <div class="mb-3">
            <label for="id_categoria" class="form-label">Categoria</label>
            {{ form.categoria }}
        </div>
        <div class="mb-3">
            <label for="id_foto" class="form-label">Foto</label>
            {{ form.foto}}
        </div>
        <button type="submit" class="btn btn-primary">Salvar</button>
    </form>
</div>
{% endblock %}
