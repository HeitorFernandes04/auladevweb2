<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" [fullscreen]="true">
  <div class="login-container">

    <div class="header">
      <h1>LOGIN</h1>
      <p>Insira suas credenciais para acessar sua conta</p>
    </div>

    <ion-item lines="none">
      <ion-label position="stacked">Usuário</ion-label>
      <ion-input
        type="text"
        placeholder="Digite seu usuário"
        [(ngModel)]="username"
        (keyup.enter)="login()"
      ></ion-input>
    </ion-item>

    <ion-item lines="none">
      <ion-label position="stacked">Senha</ion-label>
      <ion-input
        type="password"
        placeholder="Digite sua senha"
        [(ngModel)]="password"
        (keyup.enter)="login()"
      ></ion-input>
    </ion-item>

    <div class="forgot-password">
      <ion-text (click)="forgotPassword()">Esqueceu a senha?</ion-text>
    </div>

    <!-- Chama login() — método definido no .ts e mapeado para autenticarUsuario() -->
    <ion-button expand="block" class="login-button" (click)="login()">
      Entrar
    </ion-button>

    <div class="register-link">
      <p>
        Não tem uma conta?
        <span (click)="goToRegister()">Criar conta</span>
      </p>
    </div>

  </div>
</ion-content>
