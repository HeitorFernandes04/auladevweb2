<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Meus Anúncios</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <!-- Carregando -->
  <div class="loading-container" *ngIf="carregando">
    <ion-spinner name="lines-small"></ion-spinner>
    <p>Carregando...</p>
  </div>

  <!-- Estado vazio -->
  <div class="empty-state" *ngIf="!carregando && anuncios.length === 0">
    <ion-icon name="megaphone-outline"></ion-icon>
    <p>Nenhum anúncio publicado ainda.</p>
  </div>

  <!-- Lista de anúncios -->
  <div class="anuncios-lista" *ngIf="!carregando && anuncios.length > 0">
    <ion-item-sliding *ngFor="let anuncio of anuncios">

      <!-- Deslizar para a DIREITA: Editar -->
      <ion-item-options side="start">
        <ion-item-option (click)="editarAnuncio(anuncio)" class="option-editar">
          <ion-icon slot="top" name="pencil-outline"></ion-icon>
          Editar
        </ion-item-option>
      </ion-item-options>

      <!-- Card do anúncio -->
      <ion-item lines="none" class="anuncio-item">
        <div class="anuncio-card">
          <p class="anuncio-peca">{{ anuncio.nome_peca }}</p>
          <p class="anuncio-titulo">{{ anuncio.titulo }}</p>
          <p class="anuncio-preco">R$ {{ anuncio.preco | number:'1.2-2' }}</p>
        </div>
      </ion-item>

      <!-- Deslizar para a ESQUERDA: Excluir -->
      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="confirmarExclusao(anuncio)" class="option-excluir">
          <ion-icon slot="top" name="trash-outline"></ion-icon>
          Excluir
        </ion-item-option>
      </ion-item-options>

    </ion-item-sliding>
  </div>

  <!-- Modal de Edição -->
  <ion-modal [isOpen]="modalAberto" (didDismiss)="fecharModal()">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title>Editar Anúncio</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="fecharModal()" fill="clear">
              <ion-icon slot="icon-only" name="close-outline"></ion-icon>
            </ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>

      <ion-content class="modal-content ion-padding">

        <div class="modal-campo">
          <label class="modal-label">Título</label>
          <ion-input [(ngModel)]="anuncioEditando.titulo" placeholder="Título do anúncio"></ion-input>
        </div>

        <div class="modal-campo">
          <label class="modal-label">Descrição</label>
          <ion-textarea [(ngModel)]="anuncioEditando.descricao" placeholder="Descrição" rows="4" auto-grow="true"></ion-textarea>
        </div>

        <div class="modal-campo">
          <label class="modal-label">Preço (R$)</label>
          <ion-input type="number" [(ngModel)]="anuncioEditando.preco" placeholder="0,00"></ion-input>
        </div>

        <ion-button expand="block" class="salvar-button ion-margin-top" (click)="salvarEdicao()">
          Salvar Alterações
        </ion-button>

      </ion-content>
    </ng-template>
  </ion-modal>

</ion-content>
